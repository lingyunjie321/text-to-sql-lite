workflow:
  name: interview_text_to_sql_demo
  start_node: begin
  max_steps: 30
  max_repair_attempts: 3

dialect:
  name: sqlite
  allow_transpile: false
  target_dialect: sqlite

database:
  default: demo_sqlite
  connections:
    demo_sqlite:
      driver: sqlite
      url_env: DEMO_DATABASE_URL
      fallback_url: sqlite:///data/sqlite/demo.db
      read_only: true
    demo_postgres:
      driver: postgresql
      host: localhost
      port: 5432
      database_name: text_to_sql_demo
      username: readonly_user
      password_env: TEXT_TO_SQL_DB_PASSWORD
      query:
        sslmode: prefer
      read_only: true

models:
  aliases:
    light:
      provider: openai_compatible
      model: deepseek-v4-flash
      temperature: 0.0
      api_key_env: DEEPSEEK_API_KEY
      base_url_env: DEEPSEEK_BASE_URL
    strong:
      provider: openai_compatible
      model: deepseek-v4-pro
      temperature: 0.0
      api_key_env: DEEPSEEK_API_KEY
      base_url_env: DEEPSEEK_BASE_URL

schema:
  catalog_source: database
  linking:
    max_tables: 6
    max_columns_per_table: 12
    include_foreign_keys: true

retrieval:
  examples_path: configs/examples.yaml
  knowledge_path: configs/knowledge.yaml
  top_k: 5
  strategy: lexical_overlap

trace:
  enabled: true
  include_prompt_summary: true
  include_sql: true
  include_result_preview: true
  max_result_preview_rows: 5

logging:
  enabled: true
  level: INFO
  console:
    enabled: true
    format: text
  file:
    enabled: true
    path: logs/app.log
    format: json
    rotation: daily
    backup_count: 14
    encoding: utf-8
  privacy:
    sql_preview: debug_only
    prompt_preview: disabled
    include_trace_summary: debug_only
    include_traceback: debug_only
    max_preview_chars: 160
    redact_keys:
      - password
      - token
      - api_key
      - secret
      - authorization
      - api-key
      - x-api-key

nodes:
  begin:
    type: begin
  selection:
    type: selection
  schema_linking:
    type: schema_linking
  context_retrieval:
    type: context_retrieval
  example_retrieval:
    type: example_retrieval
  sql_generation:
    type: sql_generation
    target_dialect: sqlite
    prompt_template: configs/prompts/generate_sql.yaml
    patterns_path: configs/dialect_patterns.yaml
    patterns_top_k: 3
  sql_validation:
    type: sql_validation
    target_dialect: sqlite
    allow_transpile: false
    render_dialect: sqlite
    reject_write_sql: true
  sql_execution:
    type: sql_execution
    execution_dialect: sqlite
    max_rows: 100
  error_classification:
    type: error_classification
  reflection_fix:
    type: reflection_fix
    model_alias: strong
    prompt_template: configs/prompts/fix_sql.yaml
  finalization:
    type: finalization

edges:
  begin:
    on_success: selection
  selection:
    on_text_to_sql: schema_linking
  schema_linking:
    on_success: context_retrieval
    on_failure: error_classification
  context_retrieval:
    on_success: example_retrieval
    on_failure: example_retrieval
  example_retrieval:
    on_success: sql_generation
    on_failure: sql_generation
  sql_generation:
    on_success: sql_validation
    on_failure: error_classification
  sql_validation:
    on_validation_success: sql_execution
    on_validation_failed: error_classification
  sql_execution:
    on_execution_success: finalization
    on_execution_failed: error_classification
  error_classification:
    on_reflect_retry: reflection_fix
    on_attempts_exhausted: finalization
  reflection_fix:
    on_fix_complete: sql_validation
  finalization:
    terminal: true
