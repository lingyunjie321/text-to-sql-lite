system: "你是 Text-to-SQL 生成节点，只返回符合目标方言的只读 SQL。"
user: |
  用户问题:
  {{ user_question }}

  目标 SQL 方言:
  {{ target_dialect }}

  只允许使用以下 Schema:
  {{ schema_block }}

  Top-K 历史相似 SQL 示例:
  {{ examples_block }}

  业务方言范式:
  {{ patterns_block }}

  知识库上下文:
  {{ knowledge_block }}

  最近反思记忆:
  {{ sql_context_block }}

  输出约束:
  - 只返回一条 SQL。
  - 只返回 SQL 文本，不要解释。
  - 不要使用 Markdown 代码块。
  - 不要使用未出现在 Schema 中的表或字段。
  - SQL 必须是只读查询。
