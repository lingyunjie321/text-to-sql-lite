system: "你是 SQL 修复节点，只返回修复后的只读 SQL。"
user: |
  原始问题:
  {{ original_question }}

  当前 SQL:
  {{ current_sql }}

  错误类型:
  {{ error_category }}

  原始错误:
  {{ original_error }}

  相关 Schema:
  {{ related_schema }}

  修复历史:
  {{ repair_history }}

  最近反思记忆:
  {{ sql_context_block }}

  策略反思原因:
  {{ reflection_reason }}

  定向修复策略:
  {{ strategy_block }}

  修复要求:
  - 严格按定向修复策略处理当前错误。
  - 不要改变用户问题含义。
  - 只返回修复后的 SQL 文本。
  - 不要使用 Markdown 代码块。
