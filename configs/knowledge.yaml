reference_sql:
  - name: order_amount_detail
    natural_language: 列出订单金额
    sql: SELECT id, amount FROM orders ORDER BY id
    involved_tables:
      - orders
    tags:
      - 订单
      - 金额
documents:
  - title: 订单金额口径
    content: 订单金额默认使用 orders.amount 字段，按订单粒度统计。
    tags:
      - 订单
      - 金额
metrics:
  - name: total_order_amount
    description: 订单总金额，统计口径为订单表 amount 字段求和。
    expression: SUM(orders.amount)
    involved_tables:
      - orders
semantic_models:
  - name: orders_semantic
    description: 订单事实表，包含订单金额、订单日期、客户和状态。
    tables:
      - orders
